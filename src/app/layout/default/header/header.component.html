<mat-toolbar color="primary">
  <mat-toolbar-row>
    <button
      *ngIf="menuToggleable"
      mat-icon-button
      class="menu-icon"
      (click)="toggleSideBar()"
      aria-label="Открыть меню"
    >
      <mat-icon>menu</mat-icon>
    </button>

    <span>Мой портфель</span>
  </mat-toolbar-row>
</mat-toolbar>
